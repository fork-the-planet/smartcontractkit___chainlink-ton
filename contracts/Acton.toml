# fmt is not very mature yet
[fmt]
width = 100
ignore = []

[lint.rules]
compiler-error = "warn" # C001 - Reports compiler and parse errors.
unused-variable = "warn" # E001 - Checks for variables and parameters that are declared but never used.
mutable-variable-can-be-immutable = "warn" # E002 - sometimes available	Checks for variables that are declared as mutable (var) but are never mutated.
deprecated-symbol-use = "warn" # E003 - Checks for usage of deprecated symbols in code.
write-only-variable = "warn" # E004 - Checks for variables that are written to but never read.
unused-import = "warn" # E005 - Checks for imports that are never used in the file.
pure-function-call-unused = "deny" # E006 - Checks for calls to @pure functions where the result is not used.
no-bounce-handler = "allow" # E007 - Reports createMessage({ bounce: BounceMode.<...> }) calls reachable from onInternalMessage when the contract file does not declare onBouncedMessage.
used-ignored-identifier = "deny" # E008 - Checks for usages of identifiers explicitly marked as unused with a leading underscore.
mutable-parameter-can-be-immutable = "warn" # E009 - Checks for parameters that are declared as mutable (mutate) but are never mutated.
acton-import-in-contract = "deny" # E010 - Forbids importing files from .acton in contract dependency trees.
asm-function-missing-safety-comment = "allow" # TODO E011 - Requires documenting safety requirements for every declaration with an asm body.
send-mode-literal = "warn" # E012 - Warns when send mode is passed as numeric literal instead of SEND_MODE_* constants.
unauthorized-access = "deny" # E013 - Detects storage mutations (contract.setData(...), *.save()) that are reachable without a preceding admin sender check.
several-not-null-assertions = "warn" # E014 - Detects repeated not-null assertions like foo!!.
reserve-mode-literal = "warn" # E015 - Warns when reserve mode is passed as numeric literal instead of RESERVE_MODE_* constants.
dangerous-send-mode-missing-safety-comment = "warn" # E016 - Requires a SAFETY comment for msg.send(...) calls that use dangerous send-mode flags.
bless-call-missing-safety-comment = "warn" # E017 - Requires a SAFETY comment for calls to transformSliceToContinuation and for calls to any asm function that uses BLESS.
random-requires-initialization = "deny" # E018 - Requires random generator initialization before random value generation calls.
divide-before-multiply = "warn" # E019 - Detects cases where division is evaluated before multiplication.
duplicated-condition = "warn" # E020 - Detects duplicated conditions in if / else if chains.
identical-conditional-branches = "warn" # E021 - Detects conditionals where both branches are structurally identical.
no-global-variables = "warn" # E022 - Disallows top-level global variable declarations.
enum-cast-missing-safety-comment = "warn" # E024 - Requires a SAFETY comment for non-literal as casts to enum types.
missing-contract-header = "warn" # E025 - Warns when a contract source defines standard contract entrypoints but omits the contract header.
unused-expression = "warn" # E026 - Warns when an expression statement computes a value that is immediately discarded.
dict-type-use = "warn" # E027 - Warns when code uses the low-level dict type.
throw-requires-errors-enum = "warn" # E028 - Warns when symbolic throw codes are referenced as bare constants.
create-message-body-to-cell = "warn" # E029 - Warns about MyMessage { ... }.toCell() inside createMessage({ body: ... }) initializer.
throw-requires-documented-error-value = "allow" # TODO E030 - Requires documentation for enum values used as throw codes.

# I would not enable this until we get namespacing in imports
name-case-checker = "allow" # S001 - Checks identifier naming style and suggests consistent casing.

explicit-return-type = "warn" # S002 - Requires explicit return types for function declarations.
field-init-can-be-folded = "warn" # S003 - Checks for struct initialization where the field name and the variable used to initialize it are the same.
method-can-be-static = "warn" # TODO S004 - Checks for instance methods where self is unnecessary.
message-should-be-named = "allow" # S005 - Checks for messages created with createMessage(...) but named as generic msg or message.
create-message-inline-send = "warn" # S006 - Checks for inline sending of newly created messages: createMessage(...).send(...).

# Blueprint doesn't support @mapping yet
import-path-can-use-mappings = "allow" # S007 - Warns when a relative import path can be replaced with a configured @mapping/... path.

negated-is-type-can-use-not-is = "warn" # S008 - Detects negated type checks written as !(a is T).


[import-mappings]
acton = ".acton"
