name: TON - Publish contract artifacts release

# Triggered by any contracts/** tag push — both dirty tags pushed automatically by
# contracts-publish-compiled-artifacts.yml (e.g. contracts/1.6.0+abc123def456) and
# clean tags pushed manually for versioned releases (e.g. contracts/1.6.1).
#
# Clean release:
#   git tag contracts/1.6.1 && git push origin contracts/1.6.1
#
# The contracts-pkg.json inside the tarball always carries the clean version from
# package.json (set at build time by generateContractsPkg.ts). The build metadata
# is only on the tag and release name.

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'contracts/**'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          ref: ${{ github.ref }}

      - name: Derive release metadata from tag
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Strip "contracts/" prefix for the human-readable release name.
          VERSION="${TAG#contracts/}"
          # Replace / and + with - for the tarball filename.
          TAR_STEM="${TAG//\//-}"
          TAR_STEM="${TAR_STEM//+/-}"
          TAR_NAME="${TAR_STEM}.tar.gz"
          # Dirty tags (containing +) are marked as pre-releases.
          if [[ "${TAG}" == *"+"* ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi
          {
            echo "version=${VERSION}"
            echo "tar_name=${TAR_NAME}"
            echo "is_prerelease=${IS_PRERELEASE}"
          } >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG}, tarball: ${TAR_NAME}, prerelease: ${IS_PRERELEASE}"

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build contracts (Nix) and capture out path
        id: nix_build
        run: |
          set -euo pipefail
          OUT_PATH="$(nix build --print-out-paths .#contracts)"
          echo "out_path=${OUT_PATH}" >> "$GITHUB_OUTPUT"
          echo "Nix out path: ${OUT_PATH}"

      - name: Package contracts tarball
        id: package
        run: |
          set -euo pipefail
          BUILD_DIR="${{ steps.nix_build.outputs.out_path }}/lib/node_modules/@chainlink/contracts-ton/build"
          test -d "${BUILD_DIR}" # hard fail if layout changes
          mkdir -p dist
          tar -C "${BUILD_DIR}" \
              --exclude="examples.*" \
              -czf "dist/${{ steps.meta.outputs.tar_name }}" .
          echo "tar_path=dist/${{ steps.meta.outputs.tar_name }}" >> "$GITHUB_OUTPUT"

      - name: Setup GitHub Token 
        id: setup-github-token
        uses: smartcontractkit/.github/actions/setup-github-token@setup-github-token/1.0.0
        with:
          aws-role-arn: ${{ secrets.AWS_OIDC_CHAINLINK_TON_CHANGESETS_TOKEN_ISSUER_ROLE_ARN }}
          aws-lambda-url: ${{ secrets.AWS_LAMBDA_URL_GATI_CHANGESETS }}
          aws-region: ${{ vars.AWS_REGION }}
          aws-role-duration-seconds: "1800"

      - name: Publish Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda #v3.0.0
        with:
          token: ${{ steps.setup-github-token.outputs.access-token }}
          tag_name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          name: TON Contracts ${{ steps.meta.outputs.version }}
          draft: false
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files: |
            ${{ steps.package.outputs.tar_path }}
