name: TON - Contracts Formatting
permissions:
  contents: read

on:
  pull_request:

jobs:
  fmt-contracts:
    name: Check Tact/TS formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check formatting
        run: |
          pushd contracts
          nix develop .#contracts -c \
            yarn && \
            yarn fmt-contracts:check && \
            yarn fmt-typescript:check

      - name: Check generated TypeScript wrappers
        run: |
          nix run .#abigen
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated TypeScript wrappers are out of date. Run 'nix run .#abigen' and commit the result."
            git status --short
            git --no-pager diff -- contracts/wrappers/gen
            exit 1
          fi

  check-empty-cells:
    name: Check for beginCell().endCell() usage in *.tolk files
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4

      - name: Search for beginCell().endCell() in .tolk files
        run: |
          echo "Searching for 'beginCell().endCell()' in .tolk files..."

          # Find all .tolk files and search for the pattern
          MATCHES=$(grep -rn --include="*.tolk" "beginCell().endCell()" . || true)

          if [ -n "$MATCHES" ]; then
            echo ""
            echo "❌ ERROR: Found 'beginCell().endCell()' usage in .tolk files"
            echo ""
            echo "Please replace 'beginCell().endCell()' with 'createEmptyCell()' for better readability."
            echo ""
            echo "Files with issues:"
            echo "$MATCHES"
            exit 1
          else
            echo "✅ No 'beginCell().endCell()' usage found. All good!"
            exit 0
          fi
