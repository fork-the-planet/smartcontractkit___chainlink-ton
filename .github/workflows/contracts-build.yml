name: TON - Contracts

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-check:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run oplint
        run: |
          pushd contracts/contracts
          nix run .#oplint -- ccip deployable lib mcms
      - name: Run build
        run: |
          pushd contracts
          nix develop .#contracts -c yarn && yarn build
      - name: Run tests
        run: |
          pushd contracts
          nix develop .#contracts -c yarn test
      - name: Run gas report
        run: |
          pushd contracts
          nix develop .#contracts -c yarn ccip-gas-report

  build-nixpkg:
    name: Build nix package
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run build
        run: nix build -v .#contracts

  check-contract-versions:
    name: Verify Contract Version Updates
    runs-on: ubuntu-latest
    # if: github.event_name == 'pull_request'
    if: false # Temporarily disabled too reduce merging friction

    steps:
      - name: Check out PR code
        uses: actions/checkout@v5
        with:
          path: "pr-branch"

      - name: Check out base branch code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: "base-branch"

      - name: Set up Python
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c # v5.0.0
        with:
          python-version: "3.9"

      - name: Install Nix
        uses: cachix/install-nix-action@02a151ada4993995686f9ed4f1be7cfbb229e56f # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check contract versions
        run: |
          pr-branch/.github/scripts/check-contract-versions.py \
            --pr-dir pr-branch \
            --base-dir base-branch \
            --verbose
